name: Release binaries

# release-plz が GitHub release を作成した時にバイナリビルドを起動する。
# crates.io publish と tag/release 作成は release-plz.yml が担当。
on:
  release:
    types: [published]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary: grain-id
            asset_name: grain-id-linux-x86_64
          - os: macos-latest
            binary: grain-id
            asset_name: grain-id-macos-aarch64
          - os: windows-latest
            binary: grain-id.exe
            asset_name: grain-id-windows-x86_64.exe
          - os: ubuntu-24.04-arm
            binary: grain-id
            asset_name: grain-id-linux-aarch64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - run: cargo build --release -p grain-id-cli

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/release/${{ matrix.binary }} ${{ matrix.asset_name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item target/release/${{ matrix.binary }} ${{ matrix.asset_name }}

      - name: Upload binary to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ matrix.asset_name }}" --clobber
